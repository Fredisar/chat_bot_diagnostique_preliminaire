{% extends "base.html" %}

{% block title %}Inscription - MedBot{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-user-plus auth-icon"></i>
            <h1>Inscription</h1>
            <p>Créez votre compte pour commencer</p>
        </div>
        
        <!-- ✅ FORMULAIRE D'INSCRIPTION -->
        <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form">
            <div class="form-group">
                <label for="username">
                    <i class="fas fa-user"></i> Nom d'utilisateur
                </label>
                <input type="text" 
                       id="username" 
                       name="username" 
                       placeholder="Choisissez un nom d'utilisateur"
                       value="{{ request.form.get('username', '') }}"
                       required>
                <small class="form-hint">3 caractères minimum, lettres et chiffres uniquement</small>
            </div>
            
            <div class="form-group">
                <label for="email">
                    <i class="fas fa-envelope"></i> Adresse email
                </label>
                <input type="email" 
                       id="email" 
                       name="email" 
                       placeholder="votre@email.com"
                       value="{{ request.form.get('email', '') }}"
                       required>
            </div>
            
            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i> Mot de passe
                </label>
                <div class="password-input">
                    <input type="password" 
                           id="password" 
                           name="password" 
                           placeholder="Choisissez un mot de passe"
                           required>
                    <button type="button" onclick="togglePassword('password')" class="password-toggle">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <small class="form-hint">6 caractères minimum</small>
            </div>
            
            <div class="form-group">
                <label for="confirm_password">
                    <i class="fas fa-check"></i> Confirmer le mot de passe
                </label>
                <div class="password-input">
                    <input type="password" 
                           id="confirm_password" 
                           name="confirm_password" 
                           placeholder="Confirmez votre mot de passe"
                           required>
                    <button type="button" onclick="togglePassword('confirm_password')" class="password-toggle">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            
            <div class="form-terms">
                <label class="checkbox-label">
                    <input type="checkbox" required>
                    <span>J'accepte les <a href="#" target="_blank">conditions d'utilisation</a></span>
                </label>
            </div>
            
            <button type="submit" class="btn-auth">
                <i class="fas fa-user-plus"></i> S'inscrire
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Déjà un compte ? 
                <a href="{{ url_for('auth.login') }}">Se connecter</a>
            </p>
        </div>
    </div>
</div>

<style>
/* Styles spécifiques à l'inscription */
.auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 200px);
    padding: 2rem 1rem;
}

.auth-card {
    background: white;
    border-radius: 16px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
    padding: 2.5rem;
    max-width: 440px;
    width: 100%;
    animation: slideUp 0.5s ease;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.auth-header {
    text-align: center;
    margin-bottom: 2rem;
}

.auth-icon {
    font-size: 3rem;
    color: #667eea;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.5rem;
}

.auth-header h1 {
    font-size: 1.75rem;
    color: #333;
    margin-bottom: 0.25rem;
}

.auth-header p {
    color: #666;
    font-size: 0.95rem;
}

.auth-form .form-group {
    margin-bottom: 1.25rem;
}

.auth-form label {
    display: block;
    font-weight: 500;
    color: #444;
    margin-bottom: 0.4rem;
    font-size: 0.9rem;
}

.auth-form label i {
    margin-right: 0.5rem;
    color: #667eea;
}

.auth-form input[type="text"],
.auth-form input[type="email"],
.auth-form input[type="password"] {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 0.95rem;
    transition: border-color 0.3s;
}

.auth-form input:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.password-input {
    position: relative;
}

.password-toggle {
    position: absolute;
    right: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #999;
    cursor: pointer;
    padding: 0.25rem;
}

.password-toggle:hover {
    color: #666;
}

.form-hint {
    display: block;
    font-size: 0.8rem;
    color: #999;
    margin-top: 0.3rem;
}

.form-terms {
    margin-bottom: 1.5rem;
}

.checkbox-label {
    display: flex;
    align-items: center;
    font-size: 0.9rem;
    color: #666;
    cursor: pointer;
}

.checkbox-label input[type="checkbox"] {
    margin-right: 0.5rem;
    accent-color: #667eea;
}

.btn-auth {
    width: 100%;
    padding: 0.85rem;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
}

.btn-auth:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
}

.btn-auth:active {
    transform: translateY(0);
}

.btn-auth i {
    margin-right: 0.5rem;
}

.auth-footer {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid #eee;
}

.auth-footer p {
    color: #666;
    font-size: 0.9rem;
}

.auth-footer a {
    color: #667eea;
    font-weight: 500;
    text-decoration: none;
}

.auth-footer a:hover {
    text-decoration: underline;
}

/* Responsive */
@media (max-width: 640px) {
    .auth-card {
        padding: 1.5rem;
        margin: 0 0.5rem;
    }
    
    .auth-header h1 {
        font-size: 1.5rem;
    }
}
</style>

<script>
// Fonction pour afficher/masquer le mot de passe
function togglePassword(inputId) {
    const input = document.getElementById(inputId);
    const button = input.parentElement.querySelector('.password-toggle');
    const icon = button.querySelector('i');
    
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
    }
}

// Validation des mots de passe en temps réel
document.addEventListener('DOMContentLoaded', function() {
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirm_password');
    
    if (password && confirmPassword) {
        confirmPassword.addEventListener('input', function() {
            if (this.value !== password.value) {
                this.setCustomValidity('Les mots de passe ne correspondent pas');
            } else {
                this.setCustomValidity('');
            }
        });
        
        password.addEventListener('input', function() {
            if (this.value.length > 0 && this.value.length < 6) {
                this.setCustomValidity('Le mot de passe doit contenir au moins 6 caractères');
            } else {
                this.setCustomValidity('');
            }
        });
    }
});
</script>
{% endblock %}
